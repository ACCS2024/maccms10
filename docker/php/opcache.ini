; maccms10 生产推荐 OPcache + JIT 配置
; 放置位置:
;   - PHP-FPM/Apache(bare metal):复制到 PHP 的 conf.d 目录,例如
;       /etc/php/8.2/fpm/conf.d/zz-opcache.ini(随后 systemctl reload php8.2-fpm / apache2)
;   - 官方 docker php 镜像:复制到 /usr/local/etc/php/conf.d/zz-opcache.ini(本仓 docker/Dockerfile 已自动 COPY)
;
; OPcache 收益:全树 PHP 文件首次编译后缓存字节码,后续请求免重复编译。
; JIT 收益:对 CPU 密集路径(Provide.php vod_json/xml 嵌套循环、Search 聚合)
;           额外编译为机器码,预计节省 5-15ms/请求(tracing JIT,PHP 8.1+ 推荐模式)。
; 风险:JIT 不影响 IO 等待型请求;若遇极罕见崩溃可将 jit=0 关闭回退。

[opcache]
opcache.enable=1
; CLI 不缓存(采集/定时任务多为短命进程,缓存无益且占内存)
opcache.enable_cli=0
; 字节码缓存内存(MB)。maccms 文件多 + 模板编译,给足以免抖动
opcache.memory_consumption=256
; 内部字符串缓冲(MB)
opcache.interned_strings_buffer=16
; 可缓存文件数上限,必须大于项目文件总数(maccms 本体 + thinkphp + addons)
opcache.max_accelerated_files=20000
; 1=按时间戳校验源文件改动(升级自动生效);0=不校验(更快,但部署后须 reload PHP)
opcache.validate_timestamps=1
; 每 N 秒最多校验一次时间戳(validate_timestamps=1 时生效)
opcache.revalidate_freq=60
; 保留 docblock 注释(部分框架/注解依赖,稳妥起见保留)
opcache.save_comments=1
; 请求结束快速释放,降低内存峰值
opcache.fast_shutdown=1

; --- JIT (PHP 8.1+) ---
; tracing JIT:对热循环/热函数追踪并编译为机器码,是 Web 场景收益最大的模式
; 1254 = tracing JIT,自动触发,不限制 JIT 函数数量(等价于 opcache.jit=tracing)
opcache.jit=1254
; JIT 机器码缓冲(MB)。128MB 足够 maccms 全树热路径;不够时 JIT 自动降级不报错
opcache.jit_buffer_size=128M
