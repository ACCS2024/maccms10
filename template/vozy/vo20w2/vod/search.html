<script>
    function timestampToDateTime(timestamp) {
        var date = new Date(timestamp);
        var year = date.getFullYear();
        var month = ("0" + (date.getMonth() + 1)).slice(-2);
        var day = ("0" + date.getDate()).slice(-2);
        var hour = ("0" + date.getHours()).slice(-2);
        var minute = ("0" + date.getMinutes()).slice(-2);

        var dateTime = year + "-" + month + "-" + day + " " + hour + ":" + minute;
        return dateTime;
    }


    $(document).ready(function (){

        initview()
    })
  function  initview(){

      $.ajax({
          url: "https://search.bfzyapi.com/json-api/",
          data: {
              dname: "baofeng",
              key:search,
              count:50
          },
          dataType: "json",
          success: function(response) {
              // 请求成功后的处理逻辑
              console.log(response);
              $(".videoContent").empty();
              $.each(response.posts, function (idx, val) {
                  console.error(val);
                  $(".videoContent").append(`
        <li>
            <a class="videoName" target="_blank" href="/index.php/vod/detail/id/${val.vod_id}.html" style="width:370px;">${val.vod_name}</a>
            <span class="region" style="width:200px;"></span>
            <span class="category type">${val.type_name}</span>
            <a href="/index.php/vod/detail/id/${val.vod_id}.html" class="address">点击进入</a>
            <span class="time1">${timestampToDateTime(parseInt(val.vod_time.$date.$numberLong))}</span>
        </li>
    `);
              });

          },
          error: function(xhr, status, error) {
              // 请求失败后的处理逻辑
              console.log("请求失败：" + error);
          }
      });


  }
    initview()
</script>
